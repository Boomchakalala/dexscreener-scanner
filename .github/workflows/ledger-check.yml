name: Ledger check

on:
  # workflow_dispatch only — fired every few minutes by the same Cloudflare Cron Trigger
  # that fires watchlist-check.yml, on telegram-scan-webhook.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: state-file
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - run: node dist/ledgerCheck.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ledger.json
          if git diff --cached --quiet; then
            echo "No ledger changes to commit."
            exit 0
          fi
          git commit -m "chore: update paper trading ledger (ledger check) [skip ci]"
          if ! git pull --rebase; then
            echo "::warning::Rebase conflict on ledger.json (concurrent run) - skipping this run's state update."
            git rebase --abort
            exit 0
          fi
          git push
