name: Ledger report

on:
  # workflow_dispatch only — fired instantly by telegram-scan-webhook when /ledger is
  # sent in Telegram, same pattern as /scan and /flash. Read-only, no commit step.
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - run: node dist/ledgerReport.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Not actually used by ledgerReport.ts, but config.ts validates all three
          # required env vars eagerly at import time regardless of which are accessed.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
