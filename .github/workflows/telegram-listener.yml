name: Telegram listener

on:
  # No schedule: GitHub Actions' `schedule:` trigger proved unreliable even at a
  # tight 5-min cron (empirically ~1-3.5h gaps between runs, regardless of cron
  # phrasing) — see the telegram-scan-webhook Cloudflare Worker, which now
  # handles /scan and /flash instantly via a real Telegram webhook + direct
  # workflow_dispatch, bypassing this poller entirely. A bot can only have one
  # active update-delivery mode (webhook OR getUpdates), so running this on a
  # schedule now would just 409 every time. workflow_dispatch kept only as a
  # manual fallback if the webhook path ever needs troubleshooting.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: state-file
  cancel-in-progress: false

jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - run: node dist/listen.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update alert state (telegram listener) [skip ci]"
          if ! git pull --rebase; then
            echo "::warning::Rebase conflict on state.json (concurrent run) - skipping this run's state update."
            git rebase --abort
            exit 0
          fi
          git push
