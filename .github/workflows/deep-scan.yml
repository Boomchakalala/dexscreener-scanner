name: Deep scan

on:
  # No schedule: here — GitHub Actions' schedule: event proved unreliable even at a
  # nominal 4h cadence, jittering to 3.5-4.5h in practice. The real 4h cadence is now
  # driven by a Cloudflare Cron Trigger on telegram-scan-webhook, which calls
  # workflow_dispatch directly. The manual input just labels the Telegram report
  # "(manual)" when a real /scan command triggered it, vs. the routine cron tick.
  workflow_dispatch:
    inputs:
      manual:
        description: "Set true when dispatched from a real /scan command, not the cron tick"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: state-file
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - run: node dist/main.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRIGGERED_MANUALLY: ${{ inputs.manual }}

      - name: Commit updated alert history, watchlist, and ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/watchlist.json data/ledger.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update alert state + watchlist + ledger (deep scan) [skip ci]"
          if ! git pull --rebase; then
            echo "::warning::Rebase conflict on state.json (concurrent run) - skipping this run's state update."
            git rebase --abort
            exit 0
          fi
          git push
