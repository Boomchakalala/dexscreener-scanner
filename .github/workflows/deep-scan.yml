name: Deep scan

on:
  # No schedule: here — GitHub Actions' schedule: event proved unreliable even at a
  # nominal 4h cadence, jittering to 3.5-4.5h in practice. The real 4h cadence is now
  # driven by a Cloudflare Cron Trigger on telegram-scan-webhook, which calls
  # workflow_dispatch directly. The manual input just labels the Telegram report
  # "(manual)" when a real /scan command triggered it, vs. the routine cron tick.
  workflow_dispatch:
    inputs:
      manual:
        description: "Set true when dispatched from a real /scan command, not the cron tick"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: deep-scan-state
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - run: node dist/main.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRIGGERED_MANUALLY: ${{ inputs.manual }}

      - name: Commit updated alert history, watchlist, and ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Each file gets its own local commit (no pulls in between - git add/commit only
          # cares about the staged file, so this is always safe even with other files still
          # unstaged). Then ONE fetch + rebase replays all of them on top of the latest
          # remote; if a specific commit conflicts (e.g. a concurrent watchlist-check push
          # touched watchlist.json), `rebase --skip` drops just that one commit and keeps
          # going, so one file's conflict never costs the others. An earlier stash-based
          # version of this could itself conflict on `stash pop` against a remote that moved
          # again in between - this fetch-once-rebase-once-skip approach has no such gap.
          commit_if_changed() {
            local file="$1"
            local message="$2"
            git add "$file"
            if git diff --cached --quiet; then
              echo "No changes to commit for $file."
            else
              git commit -m "$message"
            fi
          }

          commit_if_changed data/state.json "chore: update alert state (deep scan) [skip ci]"
          commit_if_changed data/watchlist.json "chore: update watchlist (deep scan) [skip ci]"
          commit_if_changed data/ledger.json "chore: update ledger (deep scan) [skip ci]"

          rebase_skipping_conflicts() {
            if ! git rebase origin/master; then
              echo "::warning::Rebase conflict(s) - skipping only the commit(s) that actually conflict."
              for i in 1 2 3; do
                if [ ! -d .git/rebase-merge ] && [ ! -d .git/rebase-apply ]; then
                  break
                fi
                if ! git rebase --skip; then
                  echo "::warning::Could not continue rebase - aborting entirely, no updates from this run will be pushed."
                  git rebase --abort || true
                  return 1
                fi
              done
            fi
            return 0
          }

          git fetch origin master
          rebase_skipping_conflicts

          if ! git push; then
            echo "Push rejected - retrying once after a fresh rebase."
            git fetch origin master
            if rebase_skipping_conflicts; then
              git push
            fi
          fi
