name: Deep scan

on:
  # No schedule: here — GitHub Actions' schedule: event proved unreliable even at a
  # nominal 4h cadence, jittering to 3.5-4.5h in practice. The real 4h cadence is now
  # driven by a Cloudflare Cron Trigger on telegram-scan-webhook, which calls
  # workflow_dispatch directly. The manual input just labels the Telegram report
  # "(manual)" when a real /scan command triggered it, vs. the routine cron tick.
  workflow_dispatch:
    inputs:
      manual:
        description: "Set true when dispatched from a real /scan command, not the cron tick"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: deep-scan-state
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - run: node dist/main.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRIGGERED_MANUALLY: ${{ inputs.manual }}

      - name: Commit updated alert history, watchlist, and ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Each file gets its own independent add/commit/rebase/push cycle - NOT bundled
          # into one commit. watchlist-check.yml and ledger-check.yml now run in their own
          # concurrency groups (see their workflow files), so they can genuinely run at the
          # same time as this one. A single bundled commit meant a conflict on just
          # watchlist.json (from a concurrent watchlist-check push) aborted the whole
          # rebase and silently discarded this run's state.json/ledger.json changes too -
          # confirmed happening in practice. Committing per-file means a conflict on one
          # file only costs that file's update, never the others.
          commit_and_push() {
            local file="$1"
            local message="$2"
            git add "$file"
            if git diff --cached --quiet; then
              echo "No changes to commit for $file."
              return 0
            fi
            git commit -m "$message"
            if ! git pull --rebase; then
              echo "::warning::Rebase conflict on $file (concurrent run) - skipping this file's update."
              git rebase --abort
              return 0
            fi
            if ! git push; then
              echo "Push rejected for $file - retrying once after a fresh rebase."
              if ! git pull --rebase; then
                echo "::warning::Rebase conflict on retry for $file - skipping this file's update."
                git rebase --abort
                return 0
              fi
              git push
            fi
          }

          commit_and_push data/state.json "chore: update alert state (deep scan) [skip ci]"
          commit_and_push data/watchlist.json "chore: update watchlist (deep scan) [skip ci]"
          commit_and_push data/ledger.json "chore: update ledger (deep scan) [skip ci]"
