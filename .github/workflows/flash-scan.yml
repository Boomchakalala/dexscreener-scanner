name: Flash scan

on:
  # No schedule: here — GitHub Actions' schedule: event proved badly unreliable at a
  # nominal hourly cadence, measured jittering to 2-3.5h gaps in practice. The real
  # hourly cadence is now driven by a Cloudflare Cron Trigger on telegram-scan-webhook,
  # which calls workflow_dispatch directly. The manual input lets that same dispatch
  # call distinguish a real /flash command (which should announce "nothing flashing"
  # rather than staying silent) from the routine cron tick (which should stay silent).
  workflow_dispatch:
    inputs:
      manual:
        description: "Set true when dispatched from a real /flash command, not the cron tick"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: flash-scan-state
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - run: node dist/flash.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRIGGERED_MANUALLY: ${{ inputs.manual }}

      - name: Commit updated alert history and ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Independent per-file commits, not bundled - see deep-scan.yml for why (a
          # conflict on one file must never discard another file's changes).
          commit_and_push() {
            local file="$1"
            local message="$2"
            git add "$file"
            if git diff --cached --quiet; then
              echo "No changes to commit for $file."
              return 0
            fi
            git commit -m "$message"

            # git pull --rebase refuses to run at all if ANY file in the tree has unstaged
            # changes - including the other data/*.json files still waiting for their own
            # commit_and_push call. Stash them out of the way for this file's rebase/push,
            # then restore them so the next call still sees its pending changes.
            local stashed=false
            if ! git diff --quiet -- data/; then
              git stash push -- data/
              stashed=true
            fi

            if ! git pull --rebase; then
              echo "::warning::Rebase conflict on $file (concurrent run) - skipping this file's update."
              git rebase --abort
            elif ! git push; then
              echo "Push rejected for $file - retrying once after a fresh rebase."
              if ! git pull --rebase; then
                echo "::warning::Rebase conflict on retry for $file - skipping this file's update."
                git rebase --abort
              else
                git push
              fi
            fi

            if [ "$stashed" = true ]; then
              git stash pop
            fi
          }

          commit_and_push data/state.json "chore: update alert state (flash scan) [skip ci]"
          commit_and_push data/ledger.json "chore: update ledger (flash scan) [skip ci]"
