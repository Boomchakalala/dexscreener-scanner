name: Flash scan

on:
  # No schedule: here — GitHub Actions' schedule: event proved badly unreliable at a
  # nominal hourly cadence, measured jittering to 2-3.5h gaps in practice. The real
  # hourly cadence is now driven by a Cloudflare Cron Trigger on telegram-scan-webhook,
  # which calls workflow_dispatch directly. workflow_dispatch kept here for manual/testing use.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: state-file
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - run: node dist/flash.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated alert history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update alert state (flash scan) [skip ci]"
          if ! git pull --rebase; then
            echo "::warning::Rebase conflict on state.json (concurrent run) - skipping this run's state update."
            git rebase --abort
            exit 0
          fi
          git push
