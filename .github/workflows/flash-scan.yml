name: Flash scan

on:
  # No schedule: here — GitHub Actions' schedule: event proved badly unreliable at a
  # nominal hourly cadence, measured jittering to 2-3.5h gaps in practice. The real
  # hourly cadence is now driven by a Cloudflare Cron Trigger on telegram-scan-webhook,
  # which calls workflow_dispatch directly. The manual input lets that same dispatch
  # call distinguish a real /flash command (which should announce "nothing flashing"
  # rather than staying silent) from the routine cron tick (which should stay silent).
  workflow_dispatch:
    inputs:
      manual:
        description: "Set true when dispatched from a real /flash command, not the cron tick"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: flash-scan-state
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - run: node dist/flash.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRIGGERED_MANUALLY: ${{ inputs.manual }}

      - name: Commit updated alert history and ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Each file gets its own local commit, then one fetch + rebase (skipping only a
          # commit that actually conflicts) - see deep-scan.yml for the full reasoning.
          commit_if_changed() {
            local file="$1"
            local message="$2"
            git add "$file"
            if git diff --cached --quiet; then
              echo "No changes to commit for $file."
            else
              git commit -m "$message"
            fi
          }

          commit_if_changed data/state.json "chore: update alert state (flash scan) [skip ci]"
          commit_if_changed data/ledger.json "chore: update ledger (flash scan) [skip ci]"

          rebase_skipping_conflicts() {
            if ! git rebase origin/master; then
              echo "::warning::Rebase conflict(s) - skipping only the commit(s) that actually conflict."
              for i in 1 2 3; do
                if [ ! -d .git/rebase-merge ] && [ ! -d .git/rebase-apply ]; then
                  break
                fi
                if ! git rebase --skip; then
                  echo "::warning::Could not continue rebase - aborting entirely, no updates from this run will be pushed."
                  git rebase --abort || true
                  return 1
                fi
              done
            fi
            return 0
          }

          git fetch origin master
          rebase_skipping_conflicts

          if ! git push; then
            echo "Push rejected - retrying once after a fresh rebase."
            git fetch origin master
            if rebase_skipping_conflicts; then
              git push
            fi
          fi
